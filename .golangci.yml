run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gosec
    - gocyclo

issues:
  exclude-rules:
    # Ignore gosec issues in tests
    - path: _test\.go
      linters:
        - gosec
